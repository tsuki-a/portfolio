<!DOCTYPE html>
<html>
  <head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>数理制御によるフィギュアスケート演出VRアニメーション</title>
    <meta name="description" content="数理制御によるフィギュアスケート演出VRアニメーション">
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
	<script>
		AFRAME.registerComponent('skating-logic', {
		schema: {
			type: {type: 'string', default: 'runner1'}, // runner1, runner2
			active: {type: 'boolean', default: false}
		},

		init: function () {
			this.el.addEventListener('animationcomplete__entry', () => {
                // skating-logicを有効化
                this.el.setAttribute('skating-logic', 'active', true);

                // 自分自身に sound コンポーネントがついているか確認して再生
                if (this.el.components.sound) {
                    console.log(this.data.type + " の音楽を再生します");
                    this.el.components.sound.playSound();
                } else {
                    console.log(this.data.type + " に sound コンポーネントがありません");
                }
            });
			this.a = 25;
			this.b = 10;
			this.startT = - Math.PI / 2; // x=0, z=-10 から開始
			this.isExiting = false;
		},

		tick: function (time, timeDelta) {
			if (!this.data.active || this.isExiting) return;

			if (!this.startTime) this.startTime = time;
			let elapsed = time - this.startTime;

			let finishTime = (this.data.type === 'runner1') ? 20000 : 30000;

			//楕円開始から20秒（ちょうど1周）で退場
			if (elapsed > finishTime) { 
				this.isExiting = true;
				let currentRot = this.el.getAttribute('rotation');
				this.el.setAttribute('rotation', {
					x: 0, 
					y: currentRot.y % 360, //回転の余分な周回数を捨てる
					z: 0
				});
				this.el.emit('start-exit');
				console.log("退場します");
				return;
			}

			let loopDuration = 20; // 20秒で1周
			let t = (elapsed / 1000) * (Math.PI * 2 / loopDuration);
			let tAdjusted = t + this.startT + Math.sin(t) * 0.3;

			//座標計算
			let x = this.a * Math.cos(tAdjusted);
			let z = this.b * Math.sin(tAdjusted);
			let y = 0;

			//向き（接線）計算
			let dx = -this.a * Math.sin(tAdjusted);
			let dz = this.b * Math.cos(tAdjusted);
			let angleDeg = Math.atan2(dz, dx) * (180 / Math.PI);
			let rotationY = 0;
			let spin = 0;
			let rollZ = Math.sin(tAdjusted) * 15;

			//走者ごとの個別ロジック
			if (this.data.type === 'runner1') {
				rotationY = -(angleDeg - 90);
			// 10秒〜11秒の1秒間で3回転ジャンプ
				if (elapsed > 10000) {
					if (elapsed < 11000) {
						//スピン計算（1秒で3回転＝1080度）
						// 進捗 p (0.0 〜 1.0)
						let p = (elapsed - 10000) / 1000;
						spin = p * 1080; 

						//高さ計算（放物線）
						let jumpHeight = 1.2;
						y = -4 * jumpHeight * Math.pow(p - 0.5, 2) + jumpHeight;
					} else {
						// 11秒以降（着氷後）
						spin = 1080; // 3回転した向きをキープ
						y = 0;       // 地面
					}
				}
			} else if (this.data.type === 'runner2') {
				let pApproach = elapsed / 20000;
				if (pApproach > 1.0) pApproach = 1.0; 

				let shrinkFactor = Math.pow(pApproach, 3);
				x = x * (1 - shrinkFactor);
				z = z * (1 - shrinkFactor);

				// 1. 本来の接線方向の角度
				let targetAngle = -(angleDeg - 90);

				// 2. 20秒（スピン開始）に向けて、徐々に正面(0度)へ向きを寄せる
				// 15秒から20秒にかけて、本来の向きから 0度 にブレンドする
				if (elapsed > 15000 && elapsed <= 20000) {
					let pRotate = (elapsed - 15000) / 5000; // 0.0 〜 1.0
					// 線形補間（Lerp）: 本来の角度 * (1-p) + 目標の角度(0) * p
					rotationY = targetAngle * (1 - pRotate) + (0) * pRotate;
					
					// 20秒時点の角度を保存（ほぼ0になっているはず）
					this.lastRotationY = rotationY;
				} else if (elapsed > 20000 && elapsed <= 25000) {
					// スピンフェーズ
					x = 0; z = 0; y = 0.05;
					rotationY = this.lastRotationY || 0;
					let pSpin = (elapsed - 20000) / 5000; //5秒間のうち、どれくらい時間が進んだか（0〜1に正規化）
					pSpin = Math.min(Math.max(pSpin, 0), 1);
					let spinCurve = Math.pow(pSpin, 1.5); //進捗率にイージング効果をつける
					//spin = pSpin * 10800; // 5秒で計30回転くらい
					spin = spinCurve * 10800;
					rollZ = 0; // スピン中は傾かない
				} else if (elapsed > 25000) {
				//ストップフェーズ
					x = 0; z = 0; y = 0;
					rotationY = this.lastRotationY || 0;
					// スピンを25秒時点の値（10800度）で固定する
					spin = 10800; 
					rollZ = 0;
				} else {
					rotationY = targetAngle;
				}
			}

			this.el.setAttribute('position', {x: x, y: y, z: z});
			this.el.setAttribute('rotation', {x: 0, y: rotationY + spin, z: rollZ});
			//this.el.setAttribute('scale', {x: s, y: s, z: s});
		}
	});
	</script>
  </head>
  <body>
    <a-scene>

		<a-box id="wall-left-left" 
			position="-30.25 2 0" 
			width="0.5" height="4" depth="30" 
			color="#222244">
		</a-box>
   	
		<a-assets>    
			<!-- 3D���f���f�[�^ -->
			<a-asset-item id="1124obj" src="1124.obj"></a-asset-item>
			<!-- �}�e���A���f�[�^ -->
			<a-asset-item id="1124mtl" src="1124.mtl"></a-asset-item>
			<audio id="music1" src="runner1_theme.mp3" preload="auto"></audio>
    		<audio id="music2" src="runner2_theme.mp3" preload="auto"></audio>
		</a-assets>
				
		<a-entity id="skater1" 
			obj-model="obj: #1124obj; mtl: #1124mtl" 
			sound="src: #music1; autoplay: false; volume: 0.5; positional: false"
			position="0 0 -20"  
			skating-logic="active: false; type: runner1"
			material="color: #ccccff; metalness: 0.5; roughness: 0.2"
			scale="2 2 2"
			animation__entry="property: position; from: 0 0 -20; to: 0 0 -10; dur: 2000; easing: linear; startEvents: loaded; delay: 5000"
			animation__exit="property: position; to: 0 2.5 -20; dur: 3000; easing: easeInQuad; startEvents: start-exit"
			animation__exit_rot="property: rotation; to: 0 180 0; dur: 800; easing: easeInOutSine; startEvents: start-exit"
			animation__scale_exit="property: scale; to: 0 0 0; dur: 3000; easing: easeInQuad; startEvents: start-exit">
		</a-entity>

		<a-entity id="skater2" 
		visible="false"
		animation__visible="property: visible; to: true; dur: 1; delay: 32000"
			obj-model="obj: #1124obj; mtl: #1124mtl" 
			sound="src: #music2; autoplay: false; volume: 0.5; positional: false"
			position="0 0 -20"  
			skating-logic="active: false; type: runner2"
			scale="3 3 3"
			animation__entry="property: position; from: 0 0 -20; to: 0 0 -10; dur: 2000; easing: linear; startEvents: loaded; delay: 35000"
			animation__exit="property: position; to: 0 2.5 -20; dur: 5000; easing: easeInQuad; startEvents: start-exit"
			animation__exit_rot="property: rotation; to: 0 180 0; dur: 800; easing: easeInOutSine; startEvents: start-exit"
			animation__scale_exit="property: scale; to: 0 0 0; dur: 5000; easing: easeInQuad; startEvents: start-exit">
		</a-entity>

		<a-entity 
			id="1124_1" obj-model="obj: #1124obj; mtl: #1124mtl" 
			scale="1 1 1" position="0 -2 -2" rotation="0 180 0"
			animation__pos="property: position;
					to: 0 -2 2;
					dir: alternate;
					dur: 5000;
					loop: true;
			easing: easeInOutSine"
				animation__rot="property: rotation;
					from: 0 180 0;
					to: 0 540 0;
					dir: normal;
					dur: 2500;
					loop: true"
				animation__scl="property: scale;
					to: 2 2 2;
			dir: alternate;
			dur: 5000;
			loop: true">
		</a-entity>  


		<a-entity 
			id="1124_2" obj-model="obj: #1124obj; mtl: #1124mtl" 
			scale="1 1 1" position="-1 -2 0" rotation="0 0 0"
			animation__pos="property: position;

				animation__rot="property: rotation;

		<a-entity
